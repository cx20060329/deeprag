<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCM-RAG Engineering Reasoning System</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1>BCM-RAG</h1>
      <span class="subtitle">Engineering Reasoning System</span>
      <div class="header-right">
        <label class="toggle llm-toggle" title="Enable LLM-powered answer generation">
          <input type="checkbox" id="llmToggle" />
          <span>LLM Answer</span>
        </label>
        <button id="llmConfigBtn" class="btn sm" title="Configure LLM provider and API key">LLM Config</button>
        <div class="status-bar">
          <span id="status" class="status offline">● Disconnected</span>
          <span id="stats" class="stats"></span>
        </div>
      </div>
    </header>

    <!-- LLM Config Panel -->
    <div id="llmConfigPanel" class="llm-config hidden">
      <div class="config-row">
        <label>Provider</label>
        <select id="llmProvider">
          <option value="zhipu">Zhipu (GLM-4, 国内)</option>
          <option value="ark">Ark (Doubao, 国内)</option>
          <option value="deepseek">DeepSeek</option>
          <option value="">Custom</option>
        </select>
      </div>
      <div class="config-row">
        <label>API Key</label>
        <input id="llmApiKey" type="password" placeholder="sk-... or your key" />
      </div>
      <div class="config-row">
        <label>Model (optional)</label>
        <input id="llmModel" type="text" placeholder="glm-4-flash" />
      </div>
      <div class="config-row">
        <button id="llmSave" class="btn primary">Save & Connect</button>
        <span id="llmStatus" class="llm-status"></span>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Left: Query Panel -->
      <section class="query-panel">
        <div class="query-input-area">
          <textarea id="queryInput" rows="3" placeholder="输入工程查询...&#10;例如: 从Abandoned如何进入Driving？KeyLost会影响哪些功能？"></textarea>
          <div class="query-controls">
            <select id="modeSelect">
              <option value="fast">Fast (Jaccard, 40ms)</option>
              <option value="accurate">Accurate (Cross-Encoder, 4s)</option>
            </select>
            <label class="toggle">
              <input type="checkbox" id="agenticToggle" checked />
              <span>Agentic</span>
            </label>
            <button id="searchBtn" class="btn primary">Search</button>
          </div>
        </div>

        <!-- Quick Tests -->
        <div class="quick-tests">
          <span class="label">Quick:</span>
          <button class="btn sm" data-query="VMM电源管理模式有哪些？">VMM 电源模式</button>
          <button class="btn sm" data-query="从Abandoned如何进入Driving？">状态迁移</button>
          <button class="btn sm" data-query="为什么车辆无法从Inactive直接进入Driving？">条件推理</button>
          <button class="btn sm" data-query="KeyLost会影响哪些功能？">影响分析</button>
          <button class="btn sm" data-query="VMM状态机是否存在死锁？">可达性</button>
          <button class="btn sm" data-query="进入Driving需要满足哪些条件？">规则查询</button>
        </div>

        <!-- LLM Answer -->
        <div id="answerArea" class="answer-area"></div>

        <!-- Results -->
        <div id="results" class="results-area">
          <div class="empty-state">
            <div class="icon">⚙</div>
            <p>输入工程查询，体验 KG + Rules + State Machine 推理</p>
            <p style="font-size:11px;margin-top:4px">先配置 LLM (右上角) 以获得 AI 总结回答</p>
          </div>
        </div>
      </section>

      <!-- Right: Analysis Panel -->
      <aside class="analysis-panel" id="analysisPanel">
        <div class="panel-section">
          <h3>Evidence Chain</h3>
          <div id="evidenceChain" class="evidence-list"></div>
        </div>
        <div class="panel-section">
          <h3>Tool Calls</h3>
          <div id="toolCalls" class="tool-list"></div>
        </div>
        <div class="panel-section">
          <h3>Self-Reflection</h3>
          <div id="reflections" class="reflection-list"></div>
        </div>
        <div class="panel-section">
          <h3>Confidence</h3>
          <div id="confidenceBar" class="confidence-bar">
            <div class="fill"></div>
            <span class="label">0%</span>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
